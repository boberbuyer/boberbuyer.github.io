<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Service</title>
    <style>
        .region-content {
            display: none;
        }

        .region-content.active {
            display: block;
        }

        a {
            color: #4facfe;
            text-decoration: none;
            transition: color 0.5s ease, text-decoration 0.5s ease;
            font-weight: 500;
        }

        a:hover {
            color: #00f2fe;
            text-decoration: underline;
        }

        a:visited {
        }

        a:active {
            color: #67e8f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gotham', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #15191a);
            color: #E5E7EB;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 0;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: rgba(46, 53, 56, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.7s ease-in-out, opacity 0.7s ease-in-out;
            z-index: 1000;
            border-radius: 0 16px 16px 0;
            opacity: 0;
            transform: translateX(-20px);
        }

        .sidebar.active {
            opacity: 1;
            transform: translateX(0);
        }

        .site-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-wrap {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #007aff;
            background-color: white;
            flex-shrink: 0;
            transition: transform 0.5s ease;
        }

        .logo-wrap:hover {
            transform: scale(1.1);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title-text {
            font-size: 22px;
            font-weight: 500;
            color: #E5E7EB;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            margin-bottom: 8px;
        }

        .menu-link {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.5s ease, transform 0.5s ease;
            position: relative;
        }

        .menu-link:hover {
            color: #E5E7EB;
            transform: translateY(-2px);
        }

        .menu-link.active {
            color: #FFFFFF;
        }

        .menu-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            animation: gradientPulse 2s infinite;
        }

        .lang-selector {
            position: relative;
            margin-top: auto;
        }

        .lang-button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.5s ease, transform 0.5s ease;
            cursor: pointer;
            background: none;
            border: none;
            text-align: left;
        }

        .lang-button:hover {
            color: #E5E7EB;
            transform: translateY(-2px);
        }

        .lang-dropdown-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0%;
            background: rgba(44, 53, 57, 0.95);
            min-width: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            z-index: 1;
            animation: fadeIn 0.5s ease-in-out;
        }

        .lang-dropdown-content button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.5s ease, background 0.5s ease, transform 0.5s ease;
            cursor: pointer;
            background: none;
            border: none;
            text-align: center;
        }

        .lang-dropdown-content button:hover {
            color: #E5E7EB;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .lang-selector:hover .lang-dropdown-content {
            display: block;
        }

        .content {
            margin-left: 260px;
            padding: 0;
            width: calc(100% - 260px);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .tab-container {
            position: absolute;
            bottom: 0px;
            top: 70px;
            left: 50px;
            max-width: 80%;
            min-width: 800px;
            width: 80%;
            max-height: 85vh;
            background: rgba(37, 45, 48, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            overflow-y: auto;
            animation: slideUp 0.7s ease-in-out;
        }

        .tab-content {
            display: none;
            padding: 20px;
            border-radius: 15px;
            min-height: 600px; /* Фиксированная высота на основе содержимого rules */
            max-height: calc(85vh - 80px); /* Учитываем padding и отступы */
            overflow-y: auto;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: opacity 0.7s ease-in-out, transform 0.7s ease-in-out;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #form.tab-content {
            margin: 0;
            padding: 0;
            background: none;
            box-shadow: none;
            border-radius: 0;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            min-height: unset; /* Сброс фиксированной высоты для form */
            max-height: unset; /* Сброс максимальной высоты для form */
        }

        #form.tab-content.active {
            display: block;
            opacity: 1;
            transform: none;
        }

        .search-bar {
            margin-bottom: 24px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 14px 14px 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #E5E7EB;
            transition: box-shadow 0.5s ease, transform 0.5s ease;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 3px linear-gradient(45deg, #4facfe, #00f2fe);
            border-color: transparent;
            outline: none;
            transform: scale(1.02);
        }

        .search-bar::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 10px;
            transition: color 0.5s ease;
        }

        .search-bar input:focus + .search-bar::before {
            color: #00f2fe;
        }

        .region-submenu {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            justify-content: flex-start;
        }

        .region-button.active {
            border-bottom: 2px solid #4facfe;
            color: #FFFFFF;
            transition: color 0.7s ease, border-color 0.7s ease, transform 0.7s ease;
            padding-bottom: 10px;
        }

        .region-button {
            background: none;
            border: none;
            color: #E5E7EB;
            font-size: 14px;
            font-weight: 400;
            padding: 10px 20px;
            cursor: pointer;
            transition: transform 0.5s ease, color 0.5s ease, border-bottom 0.5s ease;
            padding-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .region-button:hover {
            transform: scale(1.1) translateY(-2px);
            color: #00f2fe;
            border-bottom: 2px solid #00f2fe;
        }

        .region-button::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4facfe, transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .region-button:hover::after {
            transform: scaleX(1);
        }

        .accordion {
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .accordion-title {
            background: rgb(45 52 55);
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 500;
            color: #E5E7EB;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
            position: relative;
        }

        .accordion-title:hover {
            background: rgb(12 12 12 / 17%);
        }

        .accordion-title::after {
            content: '↓';
            font-size: 14px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease-in-out;
        }

        .accordion-title.active::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            padding: 0 16px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
            background: rgb(12 12 12 / 17%);
            border-radius: 0 0 8px 8px;
            transition: all 0.3s ease-in-out;
        }

        .accordion-content.active {
            max-height: 3000px;
            padding: 12px 16px;
            overflow: visible;
        }

        .accordion-content p {
            margin: 0 0 8px 0;
            color: #D1D5DB;
        }

        .item {
            padding: 10px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease-in-out;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-details h3 {
            margin: 0;
            font-size: 14px;
            color: #E5E7EB;
            font-weight: 500;
        }

        .item-details p {
            margin: 3px 0 0;
            color: #D1D5DB;
            font-size: 12px;
            line-height: 1.3;
        }

        .pickup-list {
            margin: 0;
            padding: 0 0 0 20px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
        }

        .pickup-list li {
            margin-bottom: 8px;
        }

        .pickup-list li strong {
            color: #E5E7EB;
        }

        .hamburger {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            color: #E5E7EB;
            cursor: pointer;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            transition: transform 0.5s ease, color 0.5s ease;
        }

        .hamburger:hover {
            transform: rotate(90deg);
            color: #00f2fe;
        }

        .form-iframe {
            width: 100%;
            height: 100vh;
            border: none;
            border-radius: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                border-radius: 0;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
                padding: 0;
                width: 100%;
                height: 100vh;
            }

            .hamburger {
                display: block;
            }

            .form-iframe {
                height: 100vh;
            }

            .lang-dropdown-content {
                left: 50%;
                transform: translateX(-50%);
                top: 100%;
            }

            .accordion-title {
                font-size: 14px;
                padding: 10px 12px;
            }

            .accordion-content {
                padding: 0 12px;
            }

            .accordion-content.active {
                padding: 10px 12px;
            }

            .item-details h3 {
                font-size: 13px;
            }

            .item-details p {
                font-size: 12px;
            }

            a {
                color: #4facfe;
                text-decoration: none;
                transition: color 0.5s ease, text-decoration 0.5s ease;
                font-weight: 500;
            }

            a:hover {
                color: #00f2fe;
                text-decoration: underline;
            }

            a:visited {
                color: #38bdf8;
            }

            a:active {
                color: #67e8f9;
            }

            .tab-container {
                top: 35px;
                left: 45px;
                max-width: 90%;
                min-width: 300px;
                padding: 20px;
            }
        }

        /* Анимации */
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes gradientPulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Стили для спиннера загрузки */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 8px solid #f3f3f3;
            border-top: 8px solid transparent;
            border-left: 8px solid transparent;
            border-right: 8px solid #4facfe;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spinPulse 1.2s ease-in-out infinite;
            z-index: 9999;
            box-shadow: 0 0 10px #4facfe;
        }

        @keyframes spinPulse {
            0% { transform: translate(-50%, -50%) rotate(0deg); border-top-color: #4facfe; }
            50% { transform: translate(-50%, -50%) rotate(180deg); border-top-color: #00f2fe; }
            100% { transform: translate(-50%, -50%) rotate(360deg); border-top-color: #4facfe; }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader" style="display: none;"></div>

    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="sidebar">
        <div class="site-header">
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo" class="logo-img">
            </div>
            <div class="header-title-text">Bober Service</div>
        </div>
        <ul class="menu">
            <li class="menu-item"><a href="#buy-list" class="menu-link active" onclick="openTab('buy-list')">Buy List</a></li>
            <li class="menu-item"><a href="#rules" class="menu-link" onclick="openTab('rules')">Rules</a></li>
            <li class="menu-item"><a href="#pickup" class="menu-link" onclick="openTab('pickup')">Info & Pickup</a></li>
            <li class="menu-item"><a href="#links" class="menu-link" onclick="openTab('links')">Links</a></li>
            <li class="menu-item"><a href="#form" class="menu-link" onclick="openTab('form')">Form</a></li>
            <li class="menu-item lang-selector">
                <button class="lang-button" id="current-lang">🇺🇦</button>
                <div class="lang-dropdown-content" style="display: none;">
                    <button onclick="switchLang('ru')">🇷🇺</button>
                    <button onclick="switchLang('en')">🇺🇸</button>
                    <button onclick="switchLang('ua')">🇺🇦</button>
                </div>
            </li>
        </ul>
    </div>

    <div class="content">
        <div class="tab-container">
            <div id="buy-list" class="tab-content active">
                <div class="tab-inner">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
                    </div>
                    <div class="region-submenu">
                        <button class="region-button active" data-region="eu" onclick="switchRegion('eu')">EU Prices</button>
                        <button class="region-button" data-region="usa" onclick="switchRegion('usa')">USA Prices</button>
                    </div>
                    <div id="region-eu" class="region-content active">
                        <p>Loading buy list...</p>
                    </div>
                    <div id="region-usa" class="region-content">
                        <p>Ошибка загрузки USA списка: Failed to fetch</p>
                    </div>
                </div>
            </div>
            <div id="rules" class="tab-content">
                <div id="rules-content"></div>
            </div>
            <div id="pickup" class="tab-content">
                <div id="pickup-content"></div>
            </div>
            <div id="links" class="tab-content">
                <div class="accordion">
                    <div class="accordion-title" onclick="toggleAccordion(this)">Links</div>
                    <div class="accordion-content">
                        <ul class="pickup-list">
                            <li>Our bot: <a href="https://t.me/boberservice_bot">@bober_bot</a></li>
                            <li>Our channel: <a href="https://t.me/+qDWPqtDt4lMzNDM0">@bober_channel</a></li>
                            <li>Our feedback channel: <a href="https://t.me/+K4nBUvD3CMg5NmE0">@bober_feedback</a></li>
                            <li>Our admin/support: <a href="https://t.me/bober_admin">@bober_admin</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="form" class="tab-content">
            <iframe src="https://app.nocodb.com/#/nc/form/3ab4d606-d930-4ab5-85bc-81a0181a39b2" class="form-iframe"></iframe>
        </div>
    </div>

    <script>let rulesData = null;
let faqData = null;
let buyListDataEU = null;
let buyListDataUSA = null;
let currentRegion = 'eu';
let currentLang = localStorage.getItem('lang') || 'en';

function openTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelector(`a[href="#${tabId}"]`).classList.add('active');
    if (window.innerWidth <= 768) {
        document.querySelector('.sidebar').classList.remove('active');
    }
    if (tabId === 'rules') renderRules();
    if (tabId === 'pickup') renderFaq();
    if (tabId === 'buy-list' && buyListDataEU && buyListDataUSA) {
        renderBuyLists(currentRegion);
    }
}

function switchLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('current-lang').textContent = {
        'en': '🇺🇸',
        'ru': '🇷🇺',
        'ua': '🇺🇦'
    }[lang];
    document.querySelector('.lang-dropdown-content').style.display = 'none';
    renderRules();
    renderFaq();
}

function toggleAccordion(element) {
    const content = element.nextElementSibling;
    const isActive = content.classList.contains('active');
    document.querySelectorAll('.accordion-content').forEach(c => {
        c.classList.remove('active');
        c.previousElementSibling.classList.remove('active');
    });
    if (!isActive) {
        content.classList.add('active');
        element.classList.add('active');
    }
}

function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('active');
}

function searchItems() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const accordions = document.querySelectorAll('#buy-list .accordion');
    accordions.forEach(accordion => {
        const items = accordion.querySelectorAll('.item');
        let hasVisibleItems = false;
        items.forEach(item => {
            const title = item.querySelector('h3').textContent.toLowerCase();
            const desc = item.querySelector('p').textContent.toLowerCase();
            const isVisible = title.includes(input) || desc.includes(input);
            item.style.display = isVisible ? 'block' : 'none';
            if (isVisible) hasVisibleItems = true;
        });
        accordion.style.display = hasVisibleItems ? 'block' : 'none';
        if (hasVisibleItems) {
            accordion.querySelector('.accordion-content').classList.add('active');
            accordion.querySelector('.accordion-title').classList.add('active');
        }
    });
}

function switchRegion(region) {
    console.log(`Switching to region: ${region}`);
    currentRegion = region;
    document.querySelectorAll('.region-content').forEach(content => content.classList.remove('active'));
    document.querySelectorAll('.region-button').forEach(button => button.classList.remove('active'));
    const container = document.getElementById(`region-${region}`);
    if (container) {
        container.classList.add('active');
    } else {
        console.error(`Region container #region-${region} not found`);
    }
    const button = document.querySelector(`.region-button[data-region="${region}"]`);
    if (button) {
        button.classList.add('active');
    } else {
        console.error(`Region button for ${region} not found`);
    }
    renderBuyLists(region);
}

function renderItems(data, container) {
    container.innerHTML = '';
    if (!data || !Array.isArray(data)) {
        container.innerHTML = '<p>Loading buy list...</p>';
        return;
    }
    data.forEach(category => {
        if (!category.category || !Array.isArray(category.items)) return;
        const accordion = document.createElement('div');
        accordion.className = 'accordion';
        accordion.innerHTML = `
            <div class="accordion-title" onclick="toggleAccordion(this)">${category.category}</div>
            <div class="accordion-content">
                ${category.items.map(item => {
                    if (!item.name || typeof item.percentage === 'undefined' || !item.description) return '';
                    return `
                        <div class="item">
                            <div class="item-details">
                                <h3>${item.name}</h3>
                                <p>${item.percentage}% ${item.description}</p>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        container.appendChild(accordion);
    });
    if (container.innerHTML === '') {
        container.innerHTML = '<p>Нет товаров для отображения.</p>';
    }
}

function renderBuyLists(region) {
    console.log(`Rendering Buy List for region: ${region}`);
    const container = document.getElementById(`region-${region}`);
    if (!container) {
        console.error(`Container for region ${region} not found`);
        return;
    }
    const data = region === 'eu' ? buyListDataEU : buyListDataUSA;
    if (!data) {
        container.innerHTML = '<p>Loading buy list...</p>';
        return;
    }
    renderItems(data, container);
}

async function loadBuyLists() {
    try {
        const euResponse = await fetch('eu_buy_list.json');
        if (!euResponse.ok) throw new Error(`Не удалось загрузить eu_buy_list.json: ${euResponse.status}`);
        const usaResponse = await fetch('us_buy_list.json');
        if (!usaResponse.ok) throw new Error(`Не удалось загрузить us_buy_list.json: ${usaResponse.status}`);
        buyListDataEU = await euResponse.json();
        buyListDataUSA = await usaResponse.json();
        renderBuyLists(currentRegion);
    } catch (error) {
        console.error('Ошибка загрузки Buy List:', error.message);
        document.getElementById('region-eu').innerHTML = '<p>Loading buy list...</p>';
        document.getElementById('region-usa').innerHTML = '<p>Ошибка загрузки USA списка: Failed to fetch</p>';
    }
}

async function loadRules() {
    try {
        const response = await fetch('rules.json');
        rulesData = await response.json();
        renderRules();
    } catch (error) {
        console.error('Ошибка загрузки правил:', error);
    }
}

async function loadFaq() {
    try {
        const response = await fetch('faq.json');
        faqData = await response.json();
        renderFaq();
    } catch (error) {
        console.error('Ошибка загрузки FAQ:', error);
    }
}

function renderRules() {
    if (!rulesData) return;
    const container = document.getElementById('rules-content');
    container.innerHTML = '';
    rulesData.sections.forEach(section => {
        const accordion = document.createElement('div');
        accordion.className = 'accordion';
        accordion.innerHTML = `
            <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
            <div class="accordion-content">
                ${section.content[currentLang].map(item => `<p>${item}</p>`).join('')}
            </div>
        `;
        container.appendChild(accordion);
    });
}

function renderFaq() {
    if (!faqData) return;
    const container = document.getElementById('pickup-content');
    container.innerHTML = '';
    faqData.sections.forEach(section => {
        const accordion = document.createElement('div');
        accordion.className = 'accordion';
        accordion.innerHTML = `
            <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
            <div class="accordion-content">
                <ul class="pickup-list">
                    ${section.content[currentLang].map(item => `<li>${item}</li>`).join('')}
                </ul>
            </div>
        `;
        container.appendChild(accordion);
    });
}

document.addEventListener('DOMContentLoaded', async () => {
    await Promise.all([loadBuyLists(), loadRules(), loadFaq()]);
    
    // Автоматическое открытие вкладки на основе хэша URL
    const hash = window.location.hash.substring(1); // Убираем # из хэша
    if (hash && document.getElementById(hash)) {
        openTab(hash);
    } else {
        openTab('buy-list'); // По умолчанию открываем buy-list, если хэш отсутствует
    }
    switchRegion('eu');
    switchLang(currentLang);

    const sidebar = document.querySelector('.sidebar');
    if (window.innerWidth > 768) {
        sidebar.classList.add('active');
    }

    const langButton = document.getElementById('current-lang');
    const dropdown = document.querySelector('.lang-dropdown-content');
    langButton.addEventListener('click', e => {
        e.stopPropagation();
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });
    document.addEventListener('click', () => {
        dropdown.style.display = 'none';
    });

    // Скрытие спиннера после загрузки
    document.getElementById('loader').style.display = 'none';
});
