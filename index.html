        .lang-dropdown-content {

            transform: scale(1.1) translateY(-2px);
            color: #00f2fe;
            border-bottom: 2px solid #00f2fe;
        }
        .region-button::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4facfe, transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        .region-button:hover::after { transform: scaleX(1); }
        .accordion {
            margin-bottom: 15px;
            border-radius: 8px;

            background: rgba(255, 255, 255, 0.05);

            position: relative;
        }

        .accordion-title::after {
            content: '▼';
            font-size: 14px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease-in-out;
        }
        .accordion-title.active::after { transform: translateY(-50%) rotate(180deg); }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            padding: 0 16px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
            background: rgba(12, 12, 12, 0.17);
            border-radius: 0 0 8px 8px;
            transition: all 0.3s ease-in-out;
        }
        .accordion-content.active {
            max-height: 3000px;
            padding: 12px 16px;
            overflow: visible;

<body>
    <div class="loader" id="loader" style="display: none;"></div>
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="sidebar">
        <div class="site-header">
            <div class="logo-wrap">
                <img src="https://i.imgur.com/uOl8eeg.png" alt="Logo" class="logo-img">
            </div>
            <div class="header-title-text">bober⚡︎buyer</div>
        </div>
        <ul class="menu">
            <li class="menu-item"><a href="#buy-list" class="menu-link" onclick="openTab('buy-list')">Скуп Лист</a></li>
            <li class="menu-item"><a href="#rules" class="menu-link" onclick="openTab('rules')">Правила</a></li>
            <li class="menu-item"><a href="#pickup" class="menu-link active" onclick="openTab('pickup')">Инфо и Пикап</a></li>
            <li class="menu-item"><a href="#links" class="menu-link" onclick="openTab('links')">Ссылки</a></li>
            <li class="menu-item"><a href="#form" class="menu-link" onclick="openTab('form')">Форма на пикап</a></li>
            <li class="menu-item"><a href="#login" class="menu-link" onclick="promptLogin()">Логин</a></li>
            <li class="menu-item lang-selector">
                <button class="lang-button" id="current-lang">🇷🇺</button>
                <div class="lang-dropdown-content" style="display: none;">
                    <button onclick="switchLang('ru')">🇷🇺</button>
                    <button onclick="switchLang('en')">🇺🇸</button>
                    <button onclick="switchLang('ua')">🇺🇦</button>
                </div>
            </li>
        </ul>
    </div>
    <div class="content">
        <div class="tab-container">
            <div id="buy-list" class="tab-content">
                <div class="tab-inner">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
                    </div>
                    <div class="region-submenu">
                        <button class="region-button active" data-region="eu" onclick="switchRegion('eu')">EU Prices</button>
                        <button class="region-button" data-region="usa" onclick="switchRegion('usa')">USA Prices</button>
                    </div>

                    <div id="region-usa" class="region-content"></div>

            </div>
            <div id="rules" class="tab-content">
                <div id="rules-content"></div>
            </div>
            <div id="pickup" class="tab-content active">
                <div id="pickup-content"></div>
            </div>

                <div class="accordion">
                    <div class="accordion-title active" onclick="toggleAccordion(this)">Links</div>
                    <div class="accordion-content active">
                        <ul class="pickup-list">
                            <li>Our bot: <a href="https://t.me/boberservice_bot">Bober BOT</a></li>
                            <li>Our channel: <a href="https://t.me/+qDWPqtDt4lMzNDM0">Bober Main</a></li>
                            <li>Our feedback channel: <a href="https://t.me/+K4nBUvD3CMg5NmE0">Bober Feedback</a></li>
                            <li>Our admin/support: <a href="https://t.me/bobercc">@Bobercc</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="form" class="tab-content">

        </div>
        <div id="login" class="tab-content">
            <div class="login-panel" id="login-panel">
                <input type="password" id="password-input" placeholder="Enter Password">
                <p id="error-message" style="display: none;">Incorrect Password</p>
                <button onclick="checkPassword()">Login</button>
            </div>
            <iframe id="login-iframe" class="form-iframe" style="display: none;"></iframe>
        </div>

    <script>
        let rulesData = null;
        let faqData = null;
        let buyListDataEU = null;
        let buyListDataUSA = null;
        let currentRegion = 'eu';
        let currentLang = localStorage.getItem('lang') || 'en';
        const tabTitles = {
            'buy-list': { en: 'Buy List', ru: 'Скуп Лист', ua: 'Скуп Лист' },
            'rules': { en: 'Rules', ru: 'Правила', ua: 'Правила' },
            'pickup': { en: 'Info & Pickup', ru: 'Инфо и Пикап', ua: 'Інфо та Пікап' },
            'links': { en: 'Links', ru: 'Ссылки', ua: 'Посилання' },
            'form': { en: 'Pickup form', ru: 'Форма на пикап', ua: 'Форма на пикап' },
            'login': { en: 'Login', ru: 'Логин', ua: 'Логін' }
        };
        const isTelegramMiniApp = typeof window.Telegram !== 'undefined' && window.Telegram.WebApp;
        const ADMIN_PASSWORD = 'pislokozla';

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`a[href="#${tabId}"]`).classList.add('active');
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar').classList.remove('active');
            }
            if (tabId === 'rules') renderRules();
            if (tabId === 'pickup') renderFaq();
            if (tabId === 'buy-list' && buyListDataEU && buyListDataUSA) {
                renderBuyLists(currentRegion);
            }
        }

        function promptLogin() {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
            document.getElementById('login').classList.add('active');
            document.querySelector(`a[href="#login"]`).classList.add('active');
            document.getElementById('login-panel').style.display = 'flex';
            document.getElementById('login-iframe').style.display = 'none';
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar').classList.remove('active');
            }
        }

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const error = document.getElementById('error-message');
            if (input === ADMIN_PASSWORD) {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('login-iframe').style.display = 'block';
                document.getElementById('login-iframe').src = 'panel.html';
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        }

        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('current-lang').textContent = { 'en': '🇺🇸', 'ru': '🇷🇺', 'ua': '🇺🇦' }[lang];
            document.querySelector('.lang-dropdown-content').style.display = 'none';
            document.querySelectorAll('.menu-link').forEach(link => {
                const tabId = link.getAttribute('href').substring(1);
                link.textContent = tabTitles[tabId][currentLang];
            });
            renderRules();
            renderFaq();
            renderBuyLists(currentRegion); // Re-render to update header labels
        }

        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            const isActive = content.classList.contains('active');
            content.classList.toggle('active');
            element.classList.toggle('active');
        }

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }

        function searchItems() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const accordions = document.querySelectorAll('#buy-list .accordion');
            accordions.forEach(accordion => {
                const items = accordion.querySelectorAll('.item');
                let hasVisibleItems = false;
                items.forEach(item => {
                    const name = item.querySelector('.item-name').textContent.toLowerCase();
                    const percentage = item.querySelector('.item-percentage').textContent.toLowerCase();
                    const description = item.querySelector('.item-description').textContent.toLowerCase();
                    const isVisible = name.includes(input) || percentage.includes(input) || description.includes(input);
                    item.style.display = isVisible ? 'flex' : 'none';
                    if (isVisible) hasVisibleItems = true;
                });
                accordion.style.display = hasVisibleItems ? 'block' : 'none';
                if (hasVisibleItems) {
                    accordion.querySelector('.accordion-content').classList.add('active');
                    accordion.querySelector('.accordion-title').classList.add('active');
                }
            });
        }

        function switchRegion(region) {
            currentRegion = region;
            document.querySelectorAll('.region-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.region-button').forEach(button => button.classList.remove('active'));
            const container = document.getElementById(`region-${region}`);
            if (container) container.classList.add('active');
            const button = document.querySelector(`.region-button[data-region="${region}"]`);
            if (button) button.classList.add('active');
            renderBuyLists(region);
        }

        function renderItems(data, container) {
            container.innerHTML = '';
            if (!data || !Array.isArray(data)) {
                container.innerHTML = '<p>Loading buy list...</p>';
                return;
            }
            data.forEach(category => {
                if (!category.category || !Array.isArray(category.items)) return;
                const accordion = document.createElement('div');
                accordion.className = 'accordion';
                accordion.innerHTML = `
                    <div class="accordion-title" onclick="toggleAccordion(this)">${category.category}</div>
                    <div class="accordion-content">
                        <div class="item-header">
                            <span class="header-name">${currentLang === 'en' ? 'Item' : 'Товар'}</span>
                            <span class="header-percentage">${currentLang === 'en' ? 'Percentage' : 'Процент'}</span>
                            <span class="header-description">${currentLang === 'en' ? 'Description' : 'Описание'}</span>
                            <span class="header-image">${currentLang === 'en' ? 'Photo' : 'Фото'}</span>
                        </div>
                        ${category.items.map(item => {
                            if (!item.name) return '';
                            const percentage = item.percentage !== undefined && item.percentage !== '' ? `${item.percentage}%` : '';
                            const description = item.description || '';
                            const imageUrl = item.imageUrl || '';
                            return `
                                <div class="item">
                                    <span class="item-name">${item.name}</span>
                                    <span class="item-percentage">${percentage}</span>
                                    <span class="item-description">${description}</span>
                                    <div class="item-image">
                                        ${imageUrl ? `<img src="${imageUrl}" alt="${item.name}" onerror="this.remove()">` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(accordion);
            });
            if (container.innerHTML === '') {
                container.innerHTML = '<p>Нет товаров для отображения.</p>';
            }
        }

        function renderBuyLists(region) {
            const container = document.getElementById(`region-${region}`);
            if (!container) return;
            const data = region === 'eu' ? buyListDataEU : buyListDataUSA;
            if (!data) {
                container.innerHTML = '<p>Loading buy list...</p>';
                return;
            }
            renderItems(data, container);
        }

        async function loadBuyLists() {
            try {
                const euResponse = await fetch('eu_buy_list.json');
                if (!euResponse.ok) throw new Error(`Не удалось загрузить eu_buy_list.json: ${euResponse.status}`);
                const usaResponse = await fetch('us_buy_list.json');
                if (!usaResponse.ok) throw new Error(`Не удалось загрузить us_buy_list.json: ${usaResponse.status}`);
                buyListDataEU = await euResponse.json();
                buyListDataUSA = await usaResponse.json();
                // Normalize percentage and imageUrl
                [buyListDataEU, buyListDataUSA].forEach(data => {
                    data.forEach(category => {
                        category.items.forEach(item => {
                            if (item.percentage === undefined || item.percentage === null) {
                                item.percentage = '';
                            }
                            if (item.imageUrl === undefined || item.imageUrl === null) {
                                item.imageUrl = '';
                            }
                        });
                    });
                });
                renderBuyLists(currentRegion);
            } catch (error) {
                document.getElementById('region-eu').innerHTML = '<p>Loading buy list...</p>';
                document.getElementById('region-usa').innerHTML = '<p>Ошибка загрузки USA списка: Failed to fetch</p>';
            }
        }

        async function loadRules() {
            try {
                const response = await fetch('rules.json');
                rulesData = await response.json();
                renderRules();
            } catch (error) {
                console.error('Ошибка загрузки правил:', error);
            }
        }

        async function loadFaq() {
            try {
                const response = await fetch('faq.json');
                faqData = await response.json();
                renderFaq();
            } catch (error) {
                console.error('Ошибка загрузки FAQ:', error);
            }
        }

        function renderRules() {
            if (!rulesData) return;
            const container = document.getElementById('rules-content');
            container.innerHTML = '';
            rulesData.sections.forEach(section => {
                const accordion = document.createElement('div');
                accordion.className = 'accordion';
                accordion.innerHTML = `
                    <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
                    <div class="accordion-content">
                        ${section.content[currentLang].map(item => `<p>${item}</p>`).join('')}
                    </div>
                `;
                container.appendChild(accordion);
            });
        }

        function renderFaq() {
            if (!faqData) return;
            const container = document.getElementById('pickup-content');
            container.innerHTML = '';
            faqData.sections.forEach(section => {
                const accordion = document.createElement('div');
                accordion.className = 'accordion';
                accordion.innerHTML = `
                    <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
                    <div class="accordion-content">
                        <ul class="pickup-list">
                            ${section.content[currentLang].map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                `;
                container.appendChild(accordion);
            });
        }

        function handleGetAddress() {
            if (isTelegramMiniApp) {
                Telegram.WebApp.sendData('/alist');
                Telegram.WebApp.close();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadBuyLists(), loadRules(), loadFaq()]);
            const hash = window.location.hash.substring(1);
            if (hash && document.getElementById(hash) && hash !== 'login') {
                openTab(hash);
            } else {
                openTab('buy-list');
            }
            switchRegion('eu');
            switchLang(currentLang);
            const sidebar = document.querySelector('.sidebar');
            if (window.innerWidth > 768) {
                sidebar.classList.add('active');
            }
            const langButton = document.getElementById('current-lang');
            const dropdown = document.querySelector('.lang-dropdown-content');
            langButton.addEventListener('click', e => {
                e.stopPropagation();
                dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            });
            document.addEventListener('click', () => {
                dropdown.style.display = 'none';
            });
            if (isTelegramMiniApp) {
                const getAddressBtn = document.getElementById('get-address-btn');
                getAddressBtn.style.display = 'block';
            }
            document.getElementById('loader').style.display = 'none';
        });
    </script>
