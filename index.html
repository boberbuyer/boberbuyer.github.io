<html lang="ru">
<head>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bober Service Menu</title>
    <style>
        a {
            color: #4facfe;
            text-decoration: none;
            transition: color 0.3s ease, text-decoration 0.3s ease;
            font-weight: 500;
        }
        a:hover {
            color: #00f2fe;
            text-decoration: underline;
        }
        a:visited {
            color: #38bdf8;
        }
        a:active {
            color: #67e8f9;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Gotham', 'Helvetica', 'Arial', sans-serif;
            background: #15191afa;
            color: #E5E7EB;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            opacity: 0;
            transition: opacity 0.5s ease-in;
            margin: 0;
            padding: 0;
        }
        body.loaded {
            opacity: 1;
        }
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #15191a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.3s ease-out;
        }
        .preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #4facfe;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite, gradient 1.5s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes gradient {
            0% { border-color: #4facfe; }
            50% { border-color: #00f2fe; }
            100% { border-color: #4facfe; }
        }
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: rgb(46 53 56 / 95%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease-in-out, opacity 0.5s ease-in;
            z-index: 1000;
            border-radius: 0 16px 16px 0;
            opacity: 0;
            transform: translateX(-20px);
        }
        .sidebar.loaded {
            opacity: 1;
            transform: translateX(0);
        }
        .sidebar.hidden {
            transform: translateX(-100%);
        }
        .site-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 0.5s ease-in 0.2s forwards;
        }
        .logo-wrap {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #007aff;
            background-color: white;
            flex-shrink: 0;
        }
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-title-text {
            font-size: 22px;
            font-weight: 500;
            color: #E5E7EB;
        }
        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .menu-item {
            margin-bottom: 8px;
        }
        .menu-link {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, transform 0.2s ease;
            position: relative;
        }
        .menu-link:hover {
            color: #E5E7EB;
            transform: translateX(5px);
        }
        .menu-link.active {
            color: #FFFFFF;
        }
        .menu-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }
        .lang-selector {
            position: relative;
            margin-top: auto;
        }
        .lang-button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, transform 0.2s ease;
            cursor: pointer;
            background: none;
            border: none;
            text-align: left;
        }
        .lang-button:hover {
            color: #E5E7EB;
            transform: scale(1.05);
        }
        .lang-dropdown-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0%;
            background: rgba(44, 53, 57, 0.95);
            min-width: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            z-index: 1;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
        }
        .lang-dropdown-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .lang-dropdown-content button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, background 0.3s, transform 0.2s ease;
            cursor: pointer;
            background: none;
            border: none;
            text-align: center;
        }
        .lang-dropdown-content button:hover {
            color: #E5E7EB;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }
        .content {
            margin-left: 260px;
            padding: 0;
            width: calc(100% - 260px);
            height: 100vh;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease-in, transform 0.5s ease-in;
        }
        .content.loaded {
            opacity: 1;
            transform: translateY(0);
        }
        .tab-content {
            display: none;
            background: rgba(37, 45, 48, 0.95);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 11px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out, background 0.5s ease;
            height: 100%;
            width: 100%;
            overflow: auto;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
            background: rgba(37, 45, 48, 0.98);
            animation: fadeInUp 0.4s ease-out;
        }
        #form.tab-content {
            margin: 0;
            padding: 0;
            background: none;
            box-shadow: none;
            border-radius: 0;
        }
        #form.tab-content.active {
            display: block;
            opacity: 1;
            transform: none;
            animation: none;
        }
        .search-bar {
            margin-bottom: 32px;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .search-bar input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #E5E7EB;
            transition: box-shadow 0.2s, transform 0.2s ease;
        }
        .search-bar input:focus {
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.5);
            border-color: transparent;
            outline: none;
            transform: scale(1.02);
        }
        .search-bar::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 20px;
        }
        .region-submenu {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        .region-button.active {
            border-bottom: 2px solid #4facfe;
            color: #FFFFFF;
            transition: color 0.4s, border-color 0.4s, transform 0.2s ease;
            padding-bottom: 10px;
        }
        .region-button {
            background: none;
            border: none;
            color: #E5E7EB;
            font-size: 14px;
            font-weight: 400;
            padding: 10px 20px;
            cursor: pointer;
            transition: color 0.4s, border-color 0.4s, transform 0.2s ease, opacity 0.3s ease;
            padding-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        .region-button:hover {
            color: #ffffff;
            border-bottom: 2px solid #4facfe;
            padding-bottom: 10px;
            transform: scale(1.05);
        }
        .accordion {
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .accordion-title {
            background: rgb(45 52 55);
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 500;
            color: #E5E7EB;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: background 0.3s ease-in-out, transform 0.2s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .accordion-title:hover {
            background: rgb(12 12 12 / 17%);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .accordion-title::after {
            content: '↓';
            font-size: 14px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease-in-out;
        }
        .accordion-title.active::after {
            transform: translateY(-50%) rotate(180deg);
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            padding: 0 16px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
            background: rgb(12 12 12 / 17%);
            border-radius: 0 0 8px 8px;
            transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out;
        }
        .accordion-content.active {
            max-height: 1000px;
            padding: 12px 16px;
            overflow: auto;
            animation: slideDown 0.3s ease-out;
        }
        .accordion-content:not(.active) {
            animation: slideUp 0.2s ease-in forwards; /* Faster closing */
        }
        .accordion-content p {
            margin: 0 0 8px 0;
            color: #D1D5DB;
        }
        .item {
            padding: 10px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease-in-out, transform 0.2s ease;
        }
        .item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }
        .item:last-child {
            border-bottom: none;
        }
        .item-details h3 {
            margin: 0;
            font-size: 14px;
            color: #E5E7EB;
            font-weight: 500;
        }
        .item-details p {
            margin: 3px 0 0;
            color: #D1D5DB;
            font-size: 12px;
            line-height: 1.3;
        }
        .pickup-list {
            margin: 0;
            padding: 0 0 0 20px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
        }
        .pickup-list li {
            margin-bottom: 8px;
        }
        .pickup-list li strong {
            color: #E5E7EB;
        }
        .hamburger {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            color: #E5E7EB;
            cursor: pointer;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            transition: transform 0.2s ease;
        }
        .hamburger:active {
            transform: scale(1.2) rotate(90deg);
        }
        .form-iframe {
            width: 100%;
            height: 100vh;
            border: none;
            border-radius: 0;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                border-radius: 0;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .content {
                margin-left: 0;
                padding: 0;
                width: 100%;
            }
            .hamburger {
                display: block;
            }
            .form-iframe {
                height: 100vh;
            }
            .lang-dropdown-content {
                left: 50%;
                transform: translateX(-50%);
                top: 100%;
            }
            .accordion-title {
                font-size: 14px;
                padding: 10px 12px;
            }
            .accordion-content {
                padding: 0 12px;
            }
            .accordion-content.active {
                padding: 10px 12px;
            }
            .item-details h3 {
                font-size: 13px;
            }
            .item-details p {
                font-size: 12px;
            }
            .tab-inner {
                max-width: 960px;
                margin: 0 auto;
                padding: 24px 32px;
                background: rgba(255, 255, 255, 0.03);
                border-radius: 20px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            }
            @media (max-width: 768px) {
                .tab-inner {
                    padding: 16px 20px;
                    border-radius: 16px;
                }
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { max-height: 0; padding: 0 16px; opacity: 0; }
            to { max-height: 1000px; padding: 12px 16px; opacity: 1; }
        }
        @keyframes slideUp {
            from { max-height: 1000px; padding: 12px 16px; opacity: 1; }
            to { max-height: 0; padding: 0 16px; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="preloader">
        <div class="spinner"></div>
    </div>
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="sidebar">
        <div class="site-header">
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo" class="logo-img">
            </div>
            <div class="header-title-text">Bober Service</div>
        </div>
        <ul class="menu">
            <li class="menu-item"><a href="#buy-list" class="menu-link" onclick="openTab('buy-list')">Buy List</a></li>
            <li class="menu-item"><a href="#rules" class="menu-link" onclick="openTab('rules')">Rules</a></li>
            <li class="menu-item"><a href="#pickup" class="menu-link active" onclick="openTab('pickup')">Info & Pickup</a></li>
            <li class="menu-item"><a href="#links" class="menu-link" onclick="openTab('links')">Links</a></li>
            <li class="menu-item"><a href="#form" class="menu-link" onclick="openTab('form')">Form</a></li>
            <li class="menu-item lang-selector">
                <button class="lang-button" id="current-lang">🇷🇺</button>
                <div class="lang-dropdown-content">
                    <button onclick="switchLang('ru')">🇷🇺</button>
                    <button onclick="switchLang('en')">🇺🇸</button>
                    <button onclick="switchLang('ua')">🇺🇦</button>
                </div>
            </li>
        </ul>
    </div>
    <div class="content">
        <div id="buy-list" class="tab-content">
            <div class="tab-inner">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
                </div>
                <div class="region-submenu">
                    <button class="region-button active" onclick="switchRegion('eu')">EU Prices</button>
                    <button class="region-button" onclick="switchRegion('usa')">USA Prices</button>
                </div>
                <div id="region-eu" class="region-content active"></div>
                <div id="region-usa" class="region-content"></div>
            </div>
        </div>
        <div id="rules" class="tab-content">
            <div id="rules-content"></div>
        </div>
        <div id="pickup" class="tab-content active">
            <div id="pickup-content"></div>
        </div>
        <div id="links" class="tab-content">
            <div class="accordion">
                <div class="accordion-title" onclick="toggleAccordion(this)">Links</div>
                <div class="accordion-content">
                    <ul class="pickup-list">
                        <li>Our bot: <a href="https://t.me/boberservice_bot">@bober_bot</a></li>
                        <li>Our channel: <a href="https://t.me/+qDWPqtDt4lMzNDM0">@bober_channel</a></li>
                        <li>Our feedback channel: <a href="https://t.me/+K4nBUvD3CMg5NmE0">@bober_feedback</a></li>
                        <li>Our admin/support: <a href="https://t.me/bober_admin">@bober_admin</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div id="form" class="tab-content">
            <iframe src="https://app.nocodb.com/#/nc/form/3ab4d606-d930-4ab5-85bc-81a0181a39b2" class="form-iframe"></iframe>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        let rulesData = null;
        let faqData = null;
        let buyListDataEU = null;
        let buyListDataUSA = null;
        let currentLang = localStorage.getItem('lang') || 'en';

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`a[href="#${tabId}"]`).classList.add('active');
            history.replaceState(null, null, '#' + tabId);
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar').classList.remove('active');
            }
            // Close all accordions when switching tabs
            document.querySelectorAll('.accordion-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.accordion-title').forEach(title => {
                title.classList.remove('active');
            });
            if (tabId === 'rules') renderRules();
            if (tabId === 'pickup') renderFaq();
            if (tabId === 'buy-list') renderBuyLists();
        }

        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('current-lang').textContent = {
                'en': '🇺🇸',
                'ru': '🇷🇺',
                'ua': '🇺🇦'
            }[lang];
            document.querySelector('.lang-dropdown-content').classList.remove('active');
            renderRules();
            renderFaq();
        }

        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            const isActive = content.classList.contains('active');
            document.querySelectorAll('.accordion-content').forEach(c => {
                c.classList.remove('active');
                c.previousElementSibling.classList.remove('active');
            });
            if (!isActive) {
                content.classList.add('active');
                element.classList.add('active');
            }
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('active');
            document.querySelector('.hamburger').classList.add('clicked');
            setTimeout(() => document.querySelector('.hamburger').classList.remove('clicked'), 200);
        }

        function searchItems() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const accordions = document.querySelectorAll('#buy-list .accordion');
            accordions.forEach(accordion => {
                const items = accordion.querySelectorAll('.item');
                let hasVisibleItems = false;
                items.forEach(item => {
                    const title = item.querySelector('h3').textContent.toLowerCase();
                    const desc = item.querySelector('p').textContent.toLowerCase();
                    const isVisible = title.includes(input) || desc.includes(input);
                    item.style.display = isVisible ? 'block' : 'none';
                    if (isVisible) hasVisibleItems = true;
                });
                accordion.style.display = hasVisibleItems ? 'block' : 'none';
                // Only open accordion if search yields results and user hasn't manually closed it
                if (hasVisibleItems && !accordion.classList.contains('user-closed')) {
                    accordion.querySelector('.accordion-content').classList.add('active');
                    accordion.querySelector('.accordion-title').classList.add('active');
                }
            });
        }

        function switchRegion(region) {
            document.querySelectorAll('.region-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.region-button').forEach(button => {
                button.classList.remove('active');
            });
            document.getElementById(`region-${region}`).classList.add('active');
            document.querySelector(`.region-button[onclick="switchRegion('${region}')"]`).classList.add('active');
            renderBuyLists();
        }

        function renderItems(data, container) {
            if (!data || !Array.isArray(data)) {
                container.innerHTML = '<p>Ошибка загрузки данных. Нажмите кнопку ниже для обновления.</p>';
                return;
            }
            container.innerHTML = '';
            data.forEach(category => {
                if (!category.category || !Array.isArray(category.items)) {
                    console.warn('Skipping invalid category:', category);
                    return;
                }
                const accordion = document.createElement('div');
                accordion.className = 'accordion';
                accordion.innerHTML = `
                    <div class="accordion-title" onclick="toggleAccordion(this)">${category.category}</div>
                    <div class="accordion-content">
                        ${category.items.map(item => {
                            if (!item.name || typeof item.percentage === 'undefined' || !item.description) {
                                console.warn('Skipping invalid item:', item);
                                return '';
                            }
                            return `
                                <div class="item">
                                    <div class="item-details">
                                        <h3>${item.name}</h3>
                                        <p>${item.percentage}% ${item.description}</p>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(accordion);
            });
        }

        function renderBuyLists() {
            const activeRegion = document.querySelector('.region-button.active').textContent.includes('EU') ? 'eu' : 'usa';
            const container = document.getElementById(`region-${activeRegion}`);
            const data = activeRegion === 'eu' ? buyListDataEU : buyListDataUSA;

            if (!data) {
                container.innerHTML = '<p>Загрузка списка покупок...</p>';
                return;
            }
            renderItems(data, container);
        }

        async function loadBuyLists() {
            try {
                const euResponse = await fetch('https://boberbuyer.github.io/eu_buy_list.json', {
                    method: 'GET',
                    headers: tg.initData ? { 'Authorization': `Bearer ${tg.initData}` } : {}
                });
                const usaResponse = await fetch('https://boberbuyer.github.io/us_buy_list.json', {
                    method: 'GET',
                    headers: tg.initData ? { 'Authorization': `Bearer ${tg.initData}` } : {}
                });

                if (!euResponse.ok || !usaResponse.ok) {
                    throw new Error('Ошибка сети или доступ запрещен');
                }

                buyListDataEU = await euResponse.json();
                buyListDataUSA = await usaResponse.json();
                renderBuyLists();
            } catch (error) {
                console.error('Ошибка загрузки buy list:', error);
                const fallbackDataEU = [
                    { category: "iPhone", items: [{ name: "iPhone 16 Pro", percentage: 80, description: "(128/256 GB EU)" }] }
                ];
                const fallbackDataUSA = [
                    { category: "iPhone", items: [{ name: "iPhone 16 Pro", percentage: 70, description: "(128/256 GB)" }] }
                ];
                buyListDataEU = fallbackDataEU;
                buyListDataUSA = fallbackDataUSA;
                renderBuyLists();
                tg.showPopup({
                    message: 'Не удалось загрузить данные. Использованы резервные данные. Нажмите "Обновить", чтобы попробовать снова.',
                    buttons: [{ id: 'refresh', text: 'Обновить' }]
                }).then(() => loadBuyLists());
            }
        }

        async function loadRules() {
            try {
                const response = await fetch('https://boberbuyer.github.io/rules.json', {
                    method: 'GET',
                    headers: tg.initData ? { 'Authorization': `Bearer ${tg.initData}` } : {}
                });
                rulesData = await response.json();
                renderRules();
            } catch (error) {
                console.error('Error loading rules:', error);
            }
        }

        async function loadFaq() {
            try {
                const response = await fetch('https://boberbuyer.github.io/faq.json', {
                    method: 'GET',
                    headers: tg.initData ? { 'Authorization': `Bearer ${tg.initData}` } : {}
                });
                faqData = await response.json();
                renderFaq();
            } catch (error) {
                console.error('Error loading FAQ:', error);
            }
        }

        function renderRules() {
            if (!rulesData) return;
            const container = document.getElementById('rules-content');
            container.innerHTML = '';
            rulesData.sections.forEach(section => {
                const accordion = document.createElement('div');
                accordion.className = 'accordion';
                accordion.innerHTML = `
                    <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
                    <div class="accordion-content">
                        ${section.content[currentLang].map(item => `<p>${item}</p>`).join('')}
                    </div>
                `;
                container.appendChild(accordion);
            });
        }

        function renderFaq() {
            if (!faqData) return;
            const container = document.getElementById('pickup-content');
            container.innerHTML = '';
            faqData.sections.forEach(section => {
                const accordion = document.createElement('div');
                accordion.className = 'accordion';
                accordion.innerHTML = `
                    <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
                    <div class="accordion-content">
                        <ul class="pickup-list">
                            ${section.content[currentLang].map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                `;
                container.appendChild(accordion);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const preloader = document.querySelector('.preloader');
            setTimeout(() => {
                preloader.classList.add('hidden');
                document.body.classList.add('loaded');
                document.querySelector('.sidebar').classList.add('loaded');
                document.querySelector('.content').classList.add('loaded');
            }, 500);

            const hash = window.location.hash.substring(1);
            if (hash) openTab(hash);
            else openTab('buy-list');
            switchLang(currentLang);
            switchRegion('eu');
            loadBuyLists();
            loadRules();
            loadFaq();

            const langButton = document.getElementById('current-lang');
            const dropdown = document.querySelector('.lang-dropdown-content');
            langButton.addEventListener('click', e => {
                e.stopPropagation();
                dropdown.classList.toggle('active');
            });
            document.addEventListener('click', () => {
                dropdown.classList.remove('active');
            });

            tg.MainButton.setText('Обновить данные').onClick(loadBuyLists).show();
        });
    </script>
