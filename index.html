<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Service Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        a {
            color: #4facfe;
            text-decoration: none;
            transition: color 0.3s ease, text-decoration 0.3s ease;
            font-weight: 500;
        }

        a:hover {
            color: #00f2fe;
            text-decoration: underline;
        }

        a:visited {
            color: #38bdf8;
        }

        a:active {
            color: #67e8f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gotham', 'Helvetica', 'Arial', sans-serif;
            background: #15191afa;
            color: #E5E7EB;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            transition: background-color 0.3s ease;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: rgb(46 53 56 / 95%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
            z-index: 1000;
            border-radius: 0 16px 16px 0;
            opacity: 1;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            opacity: 0;
        }

        .sidebar.active {
            transform: translateX(0);
            opacity: 1;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .site-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrap {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #007aff;
            background-color: white;
            flex-shrink: 0;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title-text {
            font-size: 22px;
            font-weight: 500;
            color: #E5E7EB;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            margin-bottom: 8px;
        }

        .menu-link {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, background 0.3s ease-in-out;
            position: relative;
        }

        .menu-link:hover {
            color: #E5E7EB;
        }

        .menu-link.active {
            color: #FFFFFF;
        }

        .menu-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }

        .lang-selector {
            position: relative;
            margin-top: auto;
        }

        .lang-button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, background 0.3s ease-in-out;
            cursor: pointer;
            background: none;
            border: none;
            text-align: left;
        }

        .lang-button:hover {
            color: #E5E7EB;
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-dropdown-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0%;
            background: rgba(44, 53, 57, 0.95);
            min-width: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            z-index: 1;
            animation: dropdownFade 0.2s ease-in-out;
        }

        @keyframes dropdownFade {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lang-dropdown-content button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, background 0.3s;
            cursor: pointer;
            background: none;
            border: none;
            text-align: center;
        }

        .lang-dropdown-content button:hover {
            color: #E5E7EB;
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-selector:hover .lang-dropdown-content {
            display: block;
        }

        .content {
            margin-left: 260px;
            padding: 0;
            width: calc(100% - 260px);
            height: 100vh;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            background: rgba(37, 45, 48, 0.95);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 11px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
            height: 100%;
            width: 100%;
            overflow: auto;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: tabFade 0.4s ease-in-out;
        }

        @keyframes tabFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #form.tab-content {
            margin: 0;
            padding: 0;
            background: none;
            box-shadow: none;
            border-radius: 0;
        }

        #form.tab-content.active {
            display: block;
            opacity: 1;
            transform: none;
        }

        .search-bar {
            margin-bottom: 32px;
            position: relative;
            transition: transform 0.3s ease-in-out;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #E5E7EB;
            transition: box-shadow 0.2s ease-in-out, transform 0.2s ease-in-out;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 2px #4facfe;
            border-color: transparent;
            outline: none;
            transform: scale(1.02);
        }

        .search-bar::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 20px;
            transition: color 0.3s ease-in-out;
        }

        .search-bar input:focus + ::before {
            color: #E5E7EB;
        }

        .region-submenu {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .region-button.active {
            border-bottom: 2px solid #4facfe;
            color: #FFFFFF;
            transition: color 0.4s, border-color 0.4s;
            padding-bottom: 10px;
        }

        .region-button {
            background: none;
            border: none;
            color: #E5E7EB;
            font-size: 14px;
            font-weight: 400;
            padding: 10px 20px;
            cursor: pointer;
            transition: color 0.4s, border-color 0.4s, transform 0.2s ease-in-out;
            padding-bottom: 10px;
        }

        .region-button:hover {
            color: #ffffff;
            border-bottom: 2px solid #4facfe;
            transform: translateY(-2px);
        }

        .accordion {
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .accordion-title {
            background: rgb(45 52 55);
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 500;
            color: #E5E7EB;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
            position: relative;
        }

        .accordion-title:hover {
            background: rgb(12 12 12 / 17%);
        }

        .accordion-title::after {
            content: '↓';
            font-size: 14px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease-in-out;
        }

        .accordion-title.active::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            padding: 0 16px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
            background: rgb(12 12 12 / 17%);
            border-radius: 0 0 8px 8px;
            transition: all 0.3s ease-in-out;
        }

        .accordion-content.active {
            max-height: 1000px;
            padding: 12px 16px;
            overflow: auto;
        }

        .accordion-content p {
            margin: 0 0 8px 0;
            color: #D1D5DB;
        }

        .item {
            padding: 10px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease-in-out;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-details h3 {
            margin: 0;
            font-size: 14px;
            color: #E5E7EB;
            font-weight: 500;
        }

        .item-details p {
            margin: 3px 0 0;
            color: #D1D5DB;
            font-size: 12px;
            line-height: 1.3;
        }

        .pickup-list {
            margin: 0;
            padding: 0 0 0 20px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
        }

        .pickup-list li {
            margin-bottom: 8px;
        }

        .pickup-list li strong {
            color: #E5E7EB;
        }

        .hamburger {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            color: #E5E7EB;
            cursor: pointer;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            transition: transform 0.3s ease-in-out;
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        .form-iframe {
            width: 100%;
            height: 100vh;
            border: none;
            border-radius: 0;
        }

        .tab-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 32px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-in-out;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                border-radius: 0;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
                padding: 0;
                width: 100%;
            }

            .hamburger {
                display: block;
            }

            .form-iframe {
                height: 100vh;
            }

            .lang-dropdown-content {
                left: 50%;
                transform: translateX(-50%);
                top: 100%;
            }

            .accordion-title {
                font-size: 14px;
                padding: 10px 12px;
            }

            .accordion-content {
                padding: 0 12px;
            }

            .accordion-content.active {
                padding: 10px 12px;
            }

            .item-details h3 {
                font-size: 13px;
            }

            .item-details p {
                font-size: 12px;
            }

            .tab-inner {
                padding: 16px 20px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="sidebar">
        <div class="site-header">
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo" class="logo-img">
            </div>
            <div class="header-title-text">Bober Service</div>
        </div>
        <ul class="menu">
            <li class="menu-item"><a href="#buy-list" class="menu-link" onclick="openTab('buy-list')">Buy List</a></li>
            <li class="menu-item"><a href="#rules" class="menu-link" onclick="openTab('rules')">Rules</a></li>
            <li class="menu-item"><a href="#pickup" class="menu-link active" onclick="openTab('pickup')">Info &amp; Pickup</a></li>
            <li class="menu-item"><a href="#links" class="menu-link" onclick="openTab('links')">Links</a></li>
            <li class="menu-item"><a href="#form" class="menu-link" onclick="openTab('form')">Form</a></li>
            <li class="menu-item lang-selector">
                <button class="lang-button" id="current-lang">🇺🇦</button>
                <div class="lang-dropdown-content" style="display: none;">
                    <button onclick="switchLang('ru')">🇷🇺</button>
                    <button onclick="switchLang('en')">🇺🇸</button>
                    <button onclick="switchLang('ua')">🇺🇦</button>
                </div>
            </li>
        </ul>
    </div>

    <div class="content">
        <div id="buy-list" class="tab-content">
            <div class="tab-inner">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
                </div>
                <div class="region-submenu">
                    <button class="region-button active" onclick="switchRegion('eu')">EU Prices</button>
                    <button class="region-button" onclick="switchRegion('usa')">USA Prices</button>
                </div>
                <div id="region-eu" class="region-content active"><p>Loading buy list...</p></div>
                <div id="region-usa" class="region-content"><p>Loading buy list...</p></div>
            </div>
        </div>
        <div id="rules" class="tab-content">
            <div id="rules-content"><p>Loading rules...</p></div>
        </div>
        <div id="pickup" class="tab-content active">
            <div id="pickup-content"><p>Loading FAQ...</p></div>
        </div>
        <div id="links" class="tab-content">
            <div class="accordion">
                <div class="accordion-title" onclick="toggleAccordion(this)">Links</div>
                <div class="accordion-content">
                    <ul class="pickup-list">
                        <li>Our bot: <a href="https://t.me/boberservice_bot">@bober_bot</a></li>
                        <li>Our channel: <a href="https://t.me/+qDWPqtDt4lMzNDM0">@bober_channel</a></li>
                        <li>Our feedback channel: <a href="https://t.me/+K4nBUvD3CMg5NmE0">@bober_feedback</a></li>
                        <li>Our admin/support: <a href="https://t.me/bober_admin">@bober_admin</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div id="form" class="tab-content">
            <iframe src="https://app.nocodb.com/#/nc/form/3ab4d606-d930-4ab5-85bc-81a0181a39b2" class="form-iframe"></iframe>
        </div>
    </div>

    <!-- Replace the <script> section in the previous index.html with this -->
<script>
    let rulesData = null;
    let faqData = null;
    let buyListDataEU = null;
    let buyListDataUSA = null;
    let currentLang = localStorage.getItem('lang') || 'en';

    // Initialize Telegram Web App
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        const theme = Telegram.WebApp.themeParams;
        document.body.style.backgroundColor = theme.bg_color || '#15191afa';
        document.querySelector('.sidebar').style.backgroundColor = theme.secondary_bg_color || 'rgb(46 53 56 / 95%)';
        Telegram.WebApp.BackButton.onClick(() => {
            if (document.querySelector('.sidebar').classList.contains('active')) {
                toggleSidebar();
            } else {
                openTab('buy-list');
            }
        });
        Telegram.WebApp.BackButton.show();
    }

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`a[href="#${tabId}"]`).classList.add('active');
        history.replaceState(null, null, '#' + tabId);
        if (window.innerWidth <= 768) {
            document.querySelector('.sidebar').classList.remove('active');
        }
        if (tabId === 'rules') renderRules();
        if (tabId === 'pickup') renderFaq();
        if (tabId === 'buy-list') renderBuyLists();
    }

    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.getElementById('current-lang').textContent = {
            'en': '🇺🇸',
            'ru': '🇷🇺',
            'ua': '🇺🇦'
        }[lang];
        document.querySelector('.lang-dropdown-content').style.display = 'none';
        renderRules();
        renderFaq();
        renderBuyLists();
    }

    function toggleAccordion(element) {
        const content = element.nextElementSibling;
        const isActive = content.classList.contains('active');
        document.querySelectorAll('.accordion-content').forEach(c => {
            c.classList.remove('active');
            c.previousElementSibling.classList.remove('active');
        });
        if (!isActive) {
            content.classList.add('active');
            element.classList.add('active');
        }
    }

    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('active');
    }

    function searchItems() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const accordions = document.querySelectorAll('#buy-list .accordion');
        accordions.forEach(accordion => {
            const items = accordion.querySelectorAll('.item');
            let hasVisibleItems = false;
            items.forEach(item => {
                const title = item.querySelector('h3').textContent.toLowerCase();
                const desc = item.querySelector('p').textContent.toLowerCase();
                const isVisible = title.includes(input) || desc.includes(input);
                item.style.display = isVisible ? 'block' : 'none';
                if (isVisible) hasVisibleItems = true;
            });
            accordion.style.display = hasVisibleItems ? 'block' : 'none';
            if (hasVisibleItems) {
                accordion.querySelector('.accordion-content').classList.add('active');
                accordion.querySelector('.accordion-title').classList.add('active');
            }
        });
    }

    function switchRegion(region) {
        document.querySelectorAll('.region-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelectorAll('.region-button').forEach(button => {
            button.classList.remove('active');
        });
        document.getElementById(`region-${region}`).classList.add('active');
        document.querySelector(`.region-button[onclick="switchRegion('${region}')"]`).classList.add('active');
        console.log(`Switching to region: ${region}`);
        renderBuyLists();
    }

    function renderItems(data, container) {
        if (!data || !Array.isArray(data)) {
            console.error('Invalid data format for rendering items:', data);
            container.innerHTML = '<p>Error loading buy list. Please try again later.</p>';
            return;
        }
        container.innerHTML = '';
        data.forEach(category => {
            if (!category.category || !Array.isArray(category.items)) {
                console.warn('Skipping invalid category:', category);
                return;
            }
            const accordion = document.createElement('div');
            accordion.className = 'accordion';
            accordion.innerHTML = `
                <div class="accordion-title" onclick="toggleAccordion(this)">${category.category}</div>
                <div class="accordion-content">
                    ${category.items.map(item => {
                        // Allow empty description ('' is valid)
                        if (!item.name || typeof item.percentage === 'undefined') {
                            console.warn('Skipping invalid item:', item);
                            return '';
                        }
                        return `
                            <div class="item">
                                <div class="item-details">
                                    <h3>${item.name}</h3>
                                    <p>${item.percentage}% ${item.description || ''}</p>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            container.appendChild(accordion);
        });
    }

    function renderBuyLists() {
        const activeRegion = document.querySelector('.region-button.active').textContent.includes('EU') ? 'eu' : 'usa';
        const container = document.getElementById(`region-${activeRegion}`);
        const data = activeRegion === 'eu' ? buyListDataEU : buyListDataUSA;

        console.log(`Rendering buy list for region: ${activeRegion}`, { data });

        if (!data) {
            console.warn(`No data available for ${activeRegion}`);
            container.innerHTML = '<p>Loading buy list...</p>';
            return;
        }

        renderItems(data, container);
    }

    async function loadBuyLists() {
        try {
            console.log('Loading buy lists...');
            const euResponse = await fetch('https://boberbuyer.github.io/eu_buy_list.json', {
                headers: {
                    'Cache-Control': 'no-cache'
                }
            });
            const usaResponse = await fetch('https://boberbuyer.github.io/us_buy_list.json', {
                headers: {
                    'Cache-Control': 'no-cache'
                }
            });

            if (!euResponse.ok) throw new Error(`Failed to load EU Buy List: ${euResponse.status}`);
            if (!usaResponse.ok) throw new Error(`Failed to load USA Buy List: ${usaResponse.status}`);

            buyListDataEU = await euResponse.json();
            buyListDataUSA = await usaResponse.json();

            console.log('Buy lists loaded:', { buyListDataEU, buyListDataUSA });

            const euContainer = document.getElementById('region-eu');
            const usaContainer = document.getElementById('region-usa');

            renderItems(buyListDataEU, euContainer);
            renderItems(buyListDataUSA, usaContainer);

        } catch (error) {
            console.error('Error loading buy lists:', error);
            document.getElementById('region-eu').innerHTML = '<p>Error loading EU buy list. Please try again later.</p>';
            document.getElementById('region-usa').innerHTML = '<p>Error loading USA buy list. Please try again later.</p>';
        }
    }

    async function loadRules() {
        try {
            const response = await fetch('https://boberbuyer.github.io/rules.json');
            rulesData = await response.json();
            renderRules();
        } catch (error) {
            console.error('Error loading rules:', error);
            document.getElementById('rules-content').innerHTML = '<p>Error loading rules. Please try again later.</p>';
        }
    }

    async function loadFaq() {
        try {
            const response = await fetch('https://boberbuyer.github.io/faq.json');
            faqData = await response.json();
            renderFaq();
        } catch (error) {
            console.error('Error loading FAQ:', error);
            document.getElementById('pickup-content').innerHTML = '<p>Error loading FAQ. Please try again later.</p>';
        }
    }

    function renderRules() {
        if (!rulesData) return;
        const container = document.getElementById('rules-content');
        container.innerHTML = '';
        rulesData.sections.forEach(section => {
            const accordion = document.createElement('div');
            accordion.className = 'accordion';
            accordion.innerHTML = `
                <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
                <div class="accordion-content">
                    ${section.content[currentLang].map(item => `<p>${item}</p>`).join('')}
                </div>
            `;
            container.appendChild(accordion);
        });
    }

    function renderFaq() {
        if (!faqData) return;
        const container = document.getElementById('pickup-content');
        container.innerHTML = '';
        faqData.sections.forEach(section => {
            const accordion = document.createElement('div');
            accordion.className = 'accordion';
            accordion.innerHTML = `
                <div class="accordion-title" onclick="toggleAccordion(this)">${section.title[currentLang]}</div>
                <div class="accordion-content">
                    <ul class="pickup-list">
                        ${section.content[currentLang].map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `;
            container.appendChild(accordion);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const hash = window.location.hash.substring(1);
        if (hash) openTab(hash);
        else openTab('buy-list');
        switchLang(currentLang);
        switchRegion('eu');
        loadBuyLists();
        loadRules();
        loadFaq();

        const langButton = document.getElementById('current-lang');
        const dropdown = document.querySelector('.lang-dropdown-content');
        langButton.addEventListener('click', e => {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        });
        document.addEventListener('click', () => {
            dropdown.style.display = 'none';
        });
    });
</script>
</body>
</html>
