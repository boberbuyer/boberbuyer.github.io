<style>
            a {
            color: #4facfe;
            text-decoration: none;
            transition: color 0.3s ease, text-decoration 0.3s ease;
            font-weight: 500;
            }

            a:hover {
                color: #00f2fe;
                text-decoration: underline;
            }

            a:visited {
                color: #38bdf8;
            }

            a:active {
                color: #67e8f9;
            }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gotham', 'Helvetica', 'Arial', sans-serif;
            background: #15191afa;
            color: #E5E7EB;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: rgb(46 53 56 / 95%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            border-radius: 0 16px 16px 0;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .site-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-wrap {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #007aff;
            background-color: white;
            flex-shrink: 0;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-title-text {
            font-size: 22px;
            font-weight: 500;
            color: #E5E7EB;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            margin-bottom: 8px;
        }

        .menu-link {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s;
            position: relative;
        }

        .menu-link:hover {
            color: #E5E7EB;
        }

        .menu-link.active {
            color: #FFFFFF;
        }

        .menu-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
        }

        .lang-selector {
            position: relative;
            margin-top: auto;
        }

        .lang-button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s;
            cursor: pointer;
            background: none;
            border: none;
            text-align: left;
        }

        .lang-button:hover {
            color: #E5E7EB;
        }

        .lang-dropdown-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0%;
            background: rgba(44, 53, 57, 0.95);
            min-width: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            z-index: 1;
        }

        .lang-dropdown-content button {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            transition: color 0.3s, background 0.3s;
            cursor: pointer;
            background: none;
            border: none;
            text-align: center;
        }

        .lang-dropdown-content button:hover {
            color: #E5E7EB;
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-selector:hover .lang-dropdown-content {
            display: block;
        }

        .content {
            margin-left: 260px;
            padding: 0;
            width: calc(100% - 260px);
            height: 100vh;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            background: rgba(37, 45, 48, 0.95);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 11px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s, transform 0.4s;
            height: 100%;
            width: 100%;
            overflow: auto;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #form.tab-content {
            margin: 0;
            padding: 0;
            background: none;
            box-shadow: none;
            border-radius: 0;
        }

        #form.tab-content.active {
            display: block;
            opacity: 1;
            transform: none;
        }

        .search-bar {
            margin-bottom: 32px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #E5E7EB;
            transition: box-shadow 0.2s;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 2px linear-gradient(45deg, #4facfe, #00f2fe);
            border-color: transparent;
            outline: none;
        }

        .search-bar::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 20px;
        }

        .region-submenu {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .region-button.active {
            border-bottom: 2px solid #4facfe;
            color: #FFFFFF;
            transition: color 0.4s, border-color 0.4s;
            padding-bottom: 10px;
        }

        .region-button {
            background: none;
            border: none;
            color: #E5E7EB;
            font-size: 14px;
            font-weight: 400;
            padding: 10px 20px;
            cursor: pointer;
            transition: color 0.4s, border-color 0.4s;
            padding-bottom: 10px;
        }

        .region-button:hover {
            color: #ffffff;
            border-bottom: 2px solid #4facfe;
            padding-bottom: 10px;
        }

.accordion {
    margin-bottom: 15px;
    border-radius: 8px;
    overflow: hidden; /* важно: чтобы скругления не обрезались */
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.accordion-title {
    background: rgb(45 52 55);
    padding: 12px 16px;
    font-size: 16px;
    font-weight: 500;
    color: #E5E7EB;
    border-radius: 8px 8px 0 0; /* только верхние скругления */
    cursor: pointer;
    transition: background 0.3s ease-in-out;
    position: relative;
}

.accordion-title:hover {
    background: rgb(12 12 12 / 17%);
}

.accordion-title::after {
    content: '↓';
    font-size: 14px;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    transition: transform 0.3s ease-in-out;
}

.accordion-title.active::after {
    transform: translateY(-50%) rotate(180deg);
}

.accordion-content {
    max-height: 0;
    overflow: hidden;
    padding: 0 16px;
    color: #D1D5DB;
    font-size: 14px;
    line-height: 1.5;
    background: rgb(12 12 12 / 17%);
    border-radius: 0 0 8px 8px; /* только нижние скругления */
    transition: all 0.3s ease-in-out;
}

.accordion-content.active {
    max-height: 1000px;
    padding: 12px 16px;
    overflow: auto;
}

.accordion-content p {
    margin: 0 0 8px 0;
    color: #D1D5DB;
}


        .item {
            padding: 10px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease-in-out;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-details h3 {
            margin: 0;
            font-size: 14px;
            color: #E5E7EB;
            font-weight: 500;
        }

        .item-details p {
            margin: 3px 0 0;
            color: #D1D5DB;
            font-size: 12px;
            line-height: 1.3;
        }

        .pickup-list {
            margin: 0;
            padding: 0 0 0 20px;
            color: #D1D5DB;
            font-size: 14px;
            line-height: 1.5;
        }

        .pickup-list li {
            margin-bottom: 8px;
        }

        .pickup-list li strong {
            color: #E5E7EB;
        }

        .hamburger {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            color: #E5E7EB;
            cursor: pointer;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
        }

        .form-iframe {
            width: 100%;
            height: 100vh;
            border: none;
            border-radius: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                border-radius: 0;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
                padding: 0;
                width: 100%;
            }

            .hamburger {
                display: block;
            }

            .form-iframe {
                height: 100vh;
            }

            .lang-dropdown-content {
                left: 50%;
                transform: translateX(-50%);
                top: 100%;
            }

            .accordion-title {
                font-size: 14px;
                padding: 10px 12px;
            }

            .accordion-content {
                padding: 0 12px;
            }

            .accordion-content.active {
                padding: 10px 12px;
            }

            .item-details h3 {
                font-size: 13px;
            }

            .item-details p {
                font-size: 12px;
            }
            a {
            color: #4facfe;
            text-decoration: none;
            transition: color 0.3s ease, text-decoration 0.3s ease;
            font-weight: 500;
            }

            a:hover {
                color: #00f2fe;
                text-decoration: underline;
            }

            a:visited {
                color: #38bdf8;
            }

            a:active {
                color: #67e8f9;
            }
            .tab-inner {
                max-width: 960px;
                margin: 0 auto;

                background: rgba(255, 255, 255, 0.03);

            }

            /* Мобильная адаптация */
            @media (max-width: 768px) {
                .tab-inner {
                    padding: 16px 20px;

                }
            }

        }
